name: Build and Release

on:
  push:
    branches: [main]
    paths:
      - 'smallcaps_shared/**'
      - 'setup.py'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel

      - name: Get version
        id: version
        run: |
          VERSION=$(python setup.py --version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build package
        run: |
          python -m build
          ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump vendor/smallcaps_shared in dependent monorepos
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          # Monorepos that vendor sc-shared as a git submodule under
          # vendor/smallcaps_shared (their Dockerfiles `pip install` that path).
          # Bumping the submodule pointer triggers each repo's own deploy.yml.
          # NOTE: the legacy `sc-scanner-*` and `sc-strat-*` repos that lived
          # here have been archived as `deprecated-*` and consolidated into
          # codesmall-strategies / market-scanners-service.
          REPOS=(
            codesmall-strategies
            market-scanners-service
            research-service
            monitoring-service
            news-service
            trading-api-service
            volume-signal-service
            session-reports-service
          )
          SHARED_SHA="${{ github.sha }}"
          git config --global user.email "actions@github.com"
          git config --global user.name "sc-shared release bot"
          for repo in "${REPOS[@]}"; do
            echo "::group::Bumping Smallygon/$repo"
            tmp=$(mktemp -d)
            if ! git clone --recurse-submodules "https://x-access-token:${GH_TOKEN}@github.com/Smallygon/$repo.git" "$tmp"; then
              echo "Failed to clone $repo, skipping"
              echo "::endgroup::"
              continue
            fi
            cd "$tmp"
            if [ ! -d vendor/smallcaps_shared ]; then
              echo "$repo has no vendor/smallcaps_shared, skipping"
              cd - >/dev/null
              echo "::endgroup::"
              continue
            fi
            cd vendor/smallcaps_shared
            git fetch origin main
            git checkout "$SHARED_SHA"
            cd ../..
            git add vendor/smallcaps_shared
            if git diff --cached --quiet; then
              echo "$repo already at $SHARED_SHA"
            else
              git commit -m "chore: bump vendor/smallcaps_shared to $SHARED_SHA"
              git push origin main || echo "Push failed for $repo"
            fi
            cd - >/dev/null
            rm -rf "$tmp"
            echo "::endgroup::"
          done
